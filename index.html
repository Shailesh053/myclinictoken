<!DOCTYPE html>
<html>
<head>
  <title>MediQueue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h2>Find Nearby Clinics</h2>
    <input placeholder="Search clinic...">
  </div>

  <!-- CLINIC CARD -->
  <div class="card">
    <div class="status">Open</div>
    <div class="price">₹580</div>

    <h3>Dr. Aniket Bellare</h3>
    <p>📍 Pune</p>

    <button onclick="book()">Book Token</button>

    <div class="stats">
      <div>
        <b>0</b>
        <span>Current</span>
      </div>
      <div>
        <b>24 min</b>
        <span>Wait</span>
      </div>
      <div>
        <b>0</b>
        <span>Today</span>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="nav">
    <span>🏠 Home</span>
    <span>🎫 My Tokens</span>
    <span>👤 Profile</span>
  </div>

</div>

<script>
function book(){
  alert("Token booked!");
}
</script>

</body>
</html>
